# Netlify конфігурація для slon.life
# Статичний сайт. Кешування розділене: HTML — свіжий, ассети — з перевалідацією.

[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# Вмикаємо вбудовану оптимізацію Netlify (мініфікація CSS/JS, стиснення зображень)
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# HTML — завжди перевіряється на оновлення (контент має бути свіжим)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Зображення — кешуємо на день, але з перевалідацією (назви незмінні)
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# CSS/JS — кешуємо на день з перевалідацією
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200