# Netlify конфігурація для slon.life
# Запускає мініфікацію + вбудовування критичного CSS під час кожного деплою.

[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# Switch Off optimization

[build.processing]
skip_processing = true

# Turn On Cache and CDN

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"