<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="style.css" />

  <style>
    .fade-in {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 1.2s ease-out forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .thanks-symbol {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      display: block;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(212,168,87,0.4);
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo-block">
        <img src="img/symbol-elephant.png" alt="Elephant symbol" class="logo-elephant" />
        <div class="logo-text">
          <div class="logo-title">Ihor “Slon” Utyuzh</div>
          <div class="logo-subtitle">1996 — 2023</div>
        </div>
      </div>

      <nav class="main-nav">
        <a href="contact.html">UA</a>
        <a href="contact-en.html" class="active-lang">EN</a>

        <a href="index-en.html">Home</a>
        <a href="biography-en.html">Biography</a>
        <a href="contact-en.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container section-inner fade-in" style="max-width: 560px; text-align: center;">

        <img src="img/symbol-elephant.png" alt="Elephant symbol" class="thanks-symbol" />

        <h2>Thank You</h2>
        <p class="section-intro">
          Your message has been sent to the family.

        </p>

        <a href="index-en.html" class="btn-submit" style="display:inline-block; margin-top: 20px;">

        </a>
      </div>
    </section>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <p>In memory of Ihor “Slon” Utyuzh.</p>
        <p class="footer-muted">All materials belong to the family of Ihor Utyuzh.</p>
      </div>
      <div class="footer-right">
        <p class="footer-muted">1996 — 2023</p>
      </div>
    </div>
