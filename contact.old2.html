<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Написати родині — Ігор «Слон» Утюж</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" />
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo-block">
        <img src="img/symbol-elephant.png" alt="Символ Слон" class="logo-elephant" />
        <div class="logo-text">
          <div class="logo-title">Ігор «Слон» Утюж</div>
          <div class="logo-subtitle accent-gold">1996 — 2023</div>
        </div>
      </div>

      <nav class="main-nav">
        <a href="contact.html" class="active-lang">UA</a>
        <a href="contact-en.html">EN</a>

        <a href="index.html">Головна</a>
        <a href="biography.html">Біографія</a>
        <a href="contact.html" class="active-lang">Контакти</a>
        <a href="blog.html">Блог</a>   
      </nav>
    </div>
  </header>

  <main>
    <section id="contact" class="section">
      <div class="container section-inner" style="max-width: 560px;">
        <h2>Написати родині</h2>
        <p class="section-intro">
          Якщо ви знали Ігоря або хочете залишити слова пам'яті — напишіть родині.
          Усі повідомлення читають особисто.
        </p>

        <form id="memory-form">
          <div class="form-field">
            <label for="f-name">Ваше ім'я</label>
            <input id="f-name" type="text" name="from_name" required placeholder="Ім'я та прізвище" />
          </div>

          <div class="form-field">
            <label for="f-message">Слова пам'яті</label>
            <textarea id="f-message" name="message" required rows="5" placeholder="Поділіться спогадом або словами підтримки для родини…"></textarea>
          </div>

          <button type="submit" class="btn-submit" id="btn-send">Надіслати</button>
          <p id="form-status" style="margin-top:12px; font-size:14px; min-height:20px;"></p>
        </form>

        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script>
          emailjs.init("8yPj0R0j8kKZJis61");

          document.getElementById("memory-form").addEventListener("submit", function(e) {
            e.preventDefault();

            var btn    = document.getElementById("btn-send");
            var status = document.getElementById("form-status");

            btn.disabled = true;
            btn.textContent = "Надсилаємо…";
            status.style.color = "var(--text-muted)";
            status.textContent = "";

            emailjs.sendForm("service_m7gn0er", "template_4f5tm9i", this)
              .then(function() {
                window.location.href = "/thanks";
              }, function(error) {
                btn.disabled = false;
                btn.textContent = "Надіслати";
                status.style.color = "#e07070";
                status.textContent = "Помилка надсилання. Спробуйте ще раз або скористайтесь поштою нижче.";
                console.error("EmailJS error:", error);
              });
          });
        </script>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <p>Пам’яті Ігоря «Слона» Утюжа.</p>
        <p class="footer-muted">Усі матеріали належать родині Ігоря Утюжа.</p>
      </div>
      <div class="footer-right">
        <p class="footer-muted">18.04.1996 — 07.12.2023</p>
      </div>
    </div>
  </footer>
</body>
</html>
