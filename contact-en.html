<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Write to the Family — Ihor "Slon" Utiuzh</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" />
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo-block">
        <img src="img/symbol-elephant.png" alt="Elephant Symbol" class="logo-elephant" />
        <div class="logo-text">
          <div class="logo-title">Ihor "Slon" Utiuzh</div>
          <div class="logo-subtitle accent-gold">1996 — 2023</div>
        </div>
      </div>

      <nav class="main-nav">
        <a href="contact.html">UA</a>
        <a href="contact-en.html" class="active-lang">EN</a>

        <a href="index.html">Home</a>
        <a href="biography.html">Biography</a>
        <a href="contact-en.html" class="active-lang">Contact</a>
        <a href="blog.html">Blog</a>
      </nav>
    </div>
  </header>

  <!-- Hero section for consistency with other pages -->
  <div class="container">
    <div class="contact-hero-wrap">
      <img src="img/hero-contact-en.jpg" alt="Get in touch" class="contact-hero-img" />
    </div>
  </div>

  <main>
    <section id="contact" class="section">

      <div class="container section-inner" style="max-width: 560px;">

        <p class="section-intro">
          If you knew Ihor or would like to leave words of remembrance — write to his family.
          All messages are read personally.
        </p>

        <form id="memory-form" novalidate>

          <!-- Honeypot — hidden from humans, but bots will fill it in -->
          <div style="display:none" aria-hidden="true">
            <input type="text" name="_honey" tabindex="-1" autocomplete="off" />
          </div>

          <div class="form-field">
            <label for="f-name">Your name</label>
            <input
              id="f-name"
              type="text"
              name="from_name"
              required
              placeholder="First and last name"
              autocomplete="name"
              aria-label="Your name"
            />
          </div>

          <div class="form-field">
            <label for="f-email">
              Your email
              <span style="color: var(--text-muted); font-size: 12px;">(optional — if you would like a reply)</span>
            </label>
            <input
              id="f-email"
              type="email"
              name="reply_to"
              placeholder="email@example.com"
              autocomplete="email"
              aria-label="Your email address for a reply"
            />
          </div>

          <div class="form-field">
            <label for="f-message">Words of remembrance</label>
            <textarea
              id="f-message"
              name="message"
              required
              rows="5"
              placeholder="Share a memory or words of support for the family…"
              aria-label="Your message"
            ></textarea>
          </div>

          <button type="submit" class="btn-submit" id="btn-send">Send</button>
          <p id="form-status" role="status" aria-live="polite" style="margin-top:12px; font-size:14px; min-height:20px;"></p>
        </form>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <p>In memory of Ihor "Slon" Utiuzh.</p>
        <p class="footer-muted">All materials belong to the family of Ihor Utiuzh.</p>
      </div>
      <div class="footer-right">
        <p class="footer-muted">18.04.1996 — 07.12.2023</p>
      </div>
    </div>
  </footer>

  <!-- Scripts before </body> -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init("8yPj0R0j8kKZJis61");

    document.getElementById("memory-form").addEventListener("submit", function (e) {
      e.preventDefault();

      var btn    = document.getElementById("btn-send");
      var status = document.getElementById("form-status");

      // Honeypot check
      if (document.querySelector("input[name='_honey']").value !== "") {
        return; // bot — silently ignore
      }

      // Confirmation before sending
      var confirmed = confirm("Send this message to Ihor's family?");
      if (!confirmed) return;

      // Loading state
      btn.disabled = true;
      btn.textContent = "Sending…";
      btn.style.opacity = "0.7";
      status.style.color = "var(--text-muted)";
      status.textContent = "Please wait…";

      emailjs.sendForm("service_m7gn0er", "template_4f5tm9i", this)
        .then(function () {
          // Show success message in place instead of redirecting
          btn.style.display = "none";
          status.style.color = "var(--accent-gold)";
          status.textContent = "✓ Message sent. Thank you for remembering Ihor.";
          document.getElementById("memory-form").reset();
        }, function (error) {
          btn.disabled = false;
          btn.textContent = "Send";
          btn.style.opacity = "1";
          status.style.color = "#e07070";
          status.textContent = "Failed to send. Please try again or use the email address below.";
          console.error("EmailJS error:", error);
        });
    });
  </script>
</body>
</html>
